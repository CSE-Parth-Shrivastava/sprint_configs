server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

jwt:
  secret: finflow-super-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true

# FIX: api-docs path must be /auth/v3/api-docs so the gateway route
#      (Path=/auth/v3/api-docs rewritten to /v3/api-docs) resolves correctly.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Internal service URLs for workflow chaining
services:
  notification:
    url: http://localhost:8085
