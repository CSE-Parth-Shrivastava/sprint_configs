server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_document?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

document:
  upload-dir: uploads/documents

# FIX: was incorrectly set to /applications/v3/api-docs — corrected to /documents/v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: finflow-super-secret-key-must-be-at-least-256-bits-long-for-hs256

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true

# Internal service URLs for workflow chaining
services:
  notification:
    url: http://localhost:8085
